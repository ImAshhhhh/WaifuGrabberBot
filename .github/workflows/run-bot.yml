name: 🤖 Run WaifuGrabberBot (Docker Production)

# ─────────────────────────────────────────────────────────────────────────────
# Production-grade workflow:
#   • Spins up Postgres + Redis + the bot via docker-compose.yml
#   • Runs init_db to create schema + import 508 characters
#   • Streams logs for the chosen number of hours
#   • Tears down everything at the end
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      bot_token:
        description: "🔑 Telegram bot token from @BotFather (format: 123456:ABC-DEF...)"
        required: true
        type: string
      owner_id:
        description: "👤 Your Telegram user ID (for /admin panel) — get from @userinfobot"
        required: true
        default: "7269251740"
        type: string
      hours:
        description: "⏱️ How many hours to run the bot (max 6 on free tier)"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
      spawn_interval_minutes:
        description: "⏱️ Spawn every N minutes (default 10)"
        required: true
        default: "10"
        type: string
      use_secret:
        description: "🔒 Use BOT_TOKEN repo secret instead of the plaintext input above? (recommended)"
        required: false
        default: false
        type: boolean

concurrency:
  group: waifu-bot-run
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Resolve bot token
        id: token
        env:
          INPUT_TOKEN: ${{ inputs.bot_token }}
          SECRET_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ "${{ inputs.use_secret }}" = "true" ]; then
            if [ -z "$SECRET_TOKEN" ]; then
              echo "::error::You checked 'Use BOT_TOKEN repo secret' but no secret named BOT_TOKEN was found."
              echo "::error::Go to: Settings → Secrets and variables → Actions → New repository secret"
              echo "::error::Name: BOT_TOKEN   Value: your bot token"
              exit 1
            fi
            echo "::notice::Using BOT_TOKEN repo secret (safer)."
            echo "resolved_token=$SECRET_TOKEN" >> $GITHUB_OUTPUT
          else
            if [ -z "$INPUT_TOKEN" ]; then
              echo "::error::No bot token provided. Either paste one above OR enable 'Use BOT_TOKEN repo secret'."
              exit 1
            fi
            echo "::warning::You're passing the token as plaintext input. It will be visible in the workflow run UI to anyone with repo access. Use the repo secret option for production."
            echo "resolved_token=$INPUT_TOKEN" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Generate .env file
        env:
          BOT_TOKEN: ${{ steps.token.outputs.resolved_token }}
          OWNER_ID: ${{ inputs.owner_id }}
          SPAWN_MIN: ${{ inputs.spawn_interval_minutes }}
        run: |
          # Convert minutes to seconds for spawn_time_floor
          SPAWN_SEC=$(( SPAWN_MIN * 60 ))
          cat > .env <<EOF
          BOT_TOKEN=${BOT_TOKEN}
          BOT_USERNAME=WaifuGrabberrBot
          DATABASE_URL=postgresql+asyncpg://waifu:waifu_pass@postgres:5432/waifugrabber
          PG_POOL_MIN=5
          PG_POOL_MAX=15
          REDIS_URL=redis://redis:6379/0
          USE_WEBHOOK=false
          SPAWN_MSG_INTERVAL=100
          SPAWN_TIME_FLOOR=${SPAWN_SEC}
          SPAWN_CLAIM_WINDOW=${SPAWN_SEC}
          GUESS_COOLDOWN=3
          TRADE_WINDOW=60
          OWNER_ID=${OWNER_ID}
          LOG_LEVEL=INFO
          EOF
          # strip leading spaces (heredoc indentation)
          sed -i 's/^          //' .env
          echo "::notice::.env generated"
          echo "--- .env contents (token redacted) ---"
          sed 's/^BOT_TOKEN=.*/BOT_TOKEN=***REDACTED***/' .env

      - name: 🐳 Start Postgres + Redis + Bot via Docker Compose
        run: |
          # Start postgres + redis first (so the bot can connect on startup)
          docker compose up -d postgres redis
          echo "⏳ Waiting for Postgres to be healthy..."
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U waifu -d waifugrabber > /dev/null 2>&1; then
              echo "✓ Postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo "⏳ Waiting for Redis to be healthy..."
          for i in {1..30}; do
            if docker compose exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "✓ Redis ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: 🗄️ Initialize database (schema + 508-character CSV import)
        run: |
          # Run init_db in a one-shot container using the same image
          docker compose run --rm --no-deps bot python -m bot.db.init_db

      - name: 🚀 Start the bot container
        run: |
          docker compose up -d bot
          sleep 8
          # Verify bot is running
          if docker compose ps bot | grep -q "Up\|running"; then
            echo "✅ Bot container is up"
          else
            echo "❌ Bot container failed to start"
            docker compose logs bot
            exit 1
          fi

      - name: 📺 Stream live logs (and wait for X hours)
        env:
          HOURS: ${{ inputs.hours }}
        run: |
          SECONDS_TO_RUN=$(( HOURS * 3600 ))
          echo "⏱️  Will run for $HOURS hour(s) = $SECONDS_TO_RUN seconds."
          echo
          END=$(( $(date +%s) + SECONDS_TO_RUN ))
          LAST_LEN=0
          while [ $(date +%s) -lt $END ]; do
            # Stream new log lines from the bot container
            LOG=$(docker compose logs --tail=20 bot 2>/dev/null)
            if [ -n "$LOG" ]; then
              echo "$LOG" | tail -20
              echo "─────────────────────────────────────────────"
            fi
            sleep 30
          done

      - name: 🛑 Stop everything
        if: always()
        run: |
          echo "🛑 Stopping containers..."
          docker compose down -v --remove-orphans 2>/dev/null || true
          # Remove .env so secrets don't persist on the runner
          shred -u .env 2>/dev/null || rm -f .env
          echo "✅ Cleaned up"

      - name: 📦 Upload full bot logs as artifact
        if: always()
        run: |
          mkdir -p logs
          docker compose logs --no-color bot > logs/bot.log 2>&1 || true
          docker compose logs --no-color postgres > logs/postgres.log 2>&1 || true
          docker compose logs --no-color redis > logs/redis.log 2>&1 || true
        if: always()

      - name: 📦 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
          if-no-files-found: warn
